<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starter Repo Template</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;
  background:#0b0d12;
  color:#f4f7fb;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:32px;
}
.shell{
  width:min(920px,100%);
  border:1px solid rgba(255,255,255,.08);
  border-radius:28px;
  background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
  padding:36px;
}
.eyebrow{
  display:inline-block;
  padding:8px 12px;
  border-radius:999px;
  background:rgba(111,179,255,.1);
  color:#dfe9ff;
  font-size:12px;
}
h1{
  margin-top:18px;
  font-size:48px;
  line-height:1.02;
  letter-spacing:-.04em;
}
p{
  margin-top:16px;
  color:#aab4c4;
  font-size:17px;
  line-height:1.8;
  max-width:720px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:16px;
  margin-top:28px;
}
.card{
  padding:18px;
  border-radius:20px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.08);
}
.card strong{display:block;font-size:15px}
.card span{display:block;margin-top:8px;color:#aab4c4;font-size:13px;line-height:1.7}
code{
  display:inline-block;
  margin-top:24px;
  padding:12px 14px;
  border-radius:14px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
}
@media (max-width: 800px){
  .grid{grid-template-columns:1fr}
  h1{font-size:36px}
}
</style>
</head>
<body>
  <main class="shell">
    <span class="eyebrow">0-1 Project Starter</span>
    <h1>把这里当成你的新项目起点</h1>
    <p>这个模板提供了最小服务骨架、项目文档目录和基础验证方式。你可以直接替换首页内容、补齐 docs，并结合 role skills 进入真正的产品推进。</p>
    <div class="grid">
      <section class="card">
        <strong>先写项目总览</strong>
        <span>从目标、用户、当前阶段和最小闭环开始，而不是直接堆功能。</span>
      </section>
      <section class="card">
        <strong>再定义主流程</strong>
        <span>先让主链路能跑，再补设计、mock、测试和传播材料。</span>
      </section>
      <section class="card">
        <strong>最后做统一汇总</strong>
        <span>每轮都把结论、风险和下一步写进文档，避免上下文丢失。</span>
      </section>
    </div>
    <code>GET /api/health</code>
  </main>
</body>
</html>
